name: Build and Test

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [fre, chk]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Build and Test (${{ matrix.config }})
      run: build.bat ${{ matrix.config }}
      shell: cmd

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: matrix.config == 'fre'
      with:
        name: parcour-${{ matrix.config }}
        path: build/amd64${{ matrix.config }}/parcour.exe
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: parcour-fre

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: parcour.exe
        generate_release_notes: true
