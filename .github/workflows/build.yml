name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [fre, chk]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Build and Test (${{ matrix.config }})
      run: build.bat ${{ matrix.config }}
      shell: cmd

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: matrix.config == 'fre'
      with:
        name: parcour-${{ matrix.config }}
        path: |
          build/amd64${{ matrix.config }}/parcour.exe
          build/amd64${{ matrix.config }}/editor.exe
          build/amd64${{ matrix.config }}/test_runner.exe
        retention-days: 30
